<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome Page</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      color: #333;
      text-align: center;
      margin: 0;
      padding: 0;
    }
    h1 {
      background-color: #007acc;
      color: white;
      padding: 20px;
      margin: 0;
    }
    p {
      font-size: 1.2em;
      margin: 20px;
    }
    .docker-note {
      background-color: #e0f7fa;
      border: 2px solid #007acc;
      padding: 15px;
      margin: 30px auto;
      max-width: 600px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <h1>Welcome to My Webpage</h1>
  <p>This is a simple index.html file with a touch of style.</p>

  <div class="docker-note">
    <h2>About Docker</h2>
    <p>Docker is a powerful platform that allows developers to build, ship, and run applications inside containers. 
    Containers are lightweight, portable, and ensure consistency across different environments.</p>
  </div>
</body>
</html>
