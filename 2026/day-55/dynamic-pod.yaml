apiVersion: v1
kind: Pod
metadata:
  name: dynamic-storage-pod
  namespace: default
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
      args:
        - |
          echo "Dynamically provisioned storage works" > /data/message.txt
          sleep 3600
      volumeMounts:
        - name: dynamic-storage
          mountPath: /data

  volumes:
    - name: dynamic-storage
      persistentVolumeClaim:
        claimName: dynamic-pvc

  restartPolicy: Never
