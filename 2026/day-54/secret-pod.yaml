apiVersion: v1
kind: Pod
metadata:
  name: secret-demo-pod
spec:
  containers:
    - name: busybox
      image: busybox:1.36
      command:
        - /bin/sh
        - -c
      args:
        - |
          echo "DB_USER=$DB_USER"
          echo "Secret files:"
          ls -l /etc/db-credentials
          sleep 3600

      env:
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: DB_USER

      volumeMounts:
        - name: db-credentials-volume
          mountPath: /etc/db-credentials
          readOnly: true

  volumes:
    - name: db-credentials-volume
      secret:
        secretName: db-credentials

  restartPolicy: Never